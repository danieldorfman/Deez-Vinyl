directories:
  output: dist
  buildResources: build
appId: com.deezvinyl.app
productName: Deez Vinyl
files:
  - filter:
      - src/**/*
      - package.json
win:
  target:
    - nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerSidebar: build/installerSidebar.bmp
  uninstallerSidebar: build/uninstallerSidebar.bmp
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Deez Vinyl
  runAfterFinish: true
artifactName: DeezVinyl-${version}-${arch}-Setup.${ext}
electronVersion: 39.8.10
